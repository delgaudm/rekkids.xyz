[build]
  command = "rm -rf dist && mkdir -p dist && cp -R index.html style.css script.js collection.json covers SAMPLES dist/ && find dist -name '.DS_Store' -delete"
  publish = "dist"

[dev]
  framework = "#static"
  publish = "."
  port = 8888
  autoLaunch = false

[images]
  remote_images = ["https:\\/\\/i\\.discogs\\.com\\/.*"]
